name: PR ドキュメント差分サマリー

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/*.md'
      - 'templates/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  doc-summary:
    name: ドキュメント変更サマリーをPRにコメント
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 変更されたMarkdownファイルを取得
        id: changed-files
        run: |
          # PRの変更ファイルを取得
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '\.md$' || echo "")
          
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # 追加・変更・削除の分類
          ADDED=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD | grep '\.md$' | wc -l)
          MODIFIED=$(git diff --name-only --diff-filter=M origin/${{ github.base_ref }}...HEAD | grep '\.md$' | wc -l)
          DELETED=$(git diff --name-only --diff-filter=D origin/${{ github.base_ref }}...HEAD | grep '\.md$' | wc -l)
          
          echo "added=$ADDED"     >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED"  >> $GITHUB_OUTPUT

      - name: ドキュメント統計を計算
        id: stats
        run: |
          TOTAL=$(find . -name '*.md' -not -path '*/.git/*' | wc -l)
          echo "total_docs=$TOTAL" >> $GITHUB_OUTPUT

      - name: PRにサマリーコメントを投稿
        uses: actions/github-script@v7
        with:
          script: |
            const changed = `${{ steps.changed-files.outputs.changed_files }}`;
            const added   = ${{ steps.changed-files.outputs.added }};
            const modified = ${{ steps.changed-files.outputs.modified }};
            const deleted  = ${{ steps.changed-files.outputs.deleted }};
            const total    = ${{ steps.stats.outputs.total_docs }};
            
            if (!changed.trim()) {
              console.log('Markdownの変更なし');
              return;
            }
            
            const fileList = changed.trim().split('\n')
              .filter(f => f)
              .map(f => `- \`${f}\``)
              .join('\n');
            
            const body = `## 📄 ドキュメント変更サマリー
            
| 項目 | 件数 |
|------|------|
| ➕ 新規追加 | ${added} ファイル |
| ✏️ 変更 | ${modified} ファイル |
| 🗑️ 削除 | ${deleted} ファイル |
| 📚 総ドキュメント数（変更後） | ${total} ファイル |

### 変更されたファイル

${fileList}

---
*このコメントは GitHub Actions によって自動生成されました*`;
            
            // 既存の自動コメントを検索して更新（重複防止）
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('📄 ドキュメント変更サマリー')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
